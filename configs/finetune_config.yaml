# LoRA Fine-Tuning Configuration
# ================================

# Model
model_name: "meta-llama/Meta-Llama-3-8B-Instruct"
use_4bit: true
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"

# LoRA hyperparameters
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - v_proj
  - k_proj
  - o_proj

# Training
num_train_epochs: 3
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler_type: "cosine"
warmup_ratio: 0.05
max_seq_length: 2048
fp16: true
bf16: false

# Data
dataset: "dolly"          # oasst1, dolly, or combined
domain: "stem"            # stem, pharmacy, or finance
max_samples: 5000

# Output & logging
output_dir: "./checkpoints/llama3-stem-lora"
logging_steps: 10
save_steps: 200
eval_steps: 200
